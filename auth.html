<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login / Signup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="coffeecss.css">
</head>

<body id="auth" class="container py-5">
<nav class="navbar navbar-light fixed-top">
    <div class="container">
        <a class="navbar-brand" href="coffee.html" style="color:rgb(233, 223, 220)"><b class="bi bi-house-heart"><br>Home</b></a>
        <a class="navbar-brand" href="about.html" style="color:rgb(233, 223, 220)"><b class="bi bi-people"><br>About us</b></a>
    </div>
</nav>
<h2 class="text-center mb-4">🔐 Signup</h2>

<form id="signUp" class="col-md-6 mx-auto">

  <div class="form-field mb-3">
    <input type="text" id="username" class="form-control" placeholder="Enter your name">
    <small></small>
  </div>

  <div class="form-field mb-3">
    <input type="email" id="email" class="form-control" placeholder="Enter your email">
    <small></small>
  </div>

  <div class="form-field mb-3">
    <input type="password" id="password" class="form-control" placeholder="Enter password">
    <small></small>
  </div>

  <div class="form-field mb-3">
    <input type="password" id="confirm-password" class="form-control" placeholder="Confirm password">
    <small></small>
  </div>

  <button type="submit" class="btn btn-success w-100">Signup</button>

</form>
<hr class="my-5">

<h2 class="text-center mb-4">🔐 Login</h2>

<form id="loginForm" class="col-md-6 mx-auto">

  <div class="form-field mb-3">
    <input type="email" id="loginEmail" class="form-control" placeholder="Enter email">
    <small></small>
  </div>

  <div class="form-field mb-3">
    <input type="password" id="loginPassword" class="form-control" placeholder="Enter password">
    <small></small>
  </div>

  <button type="submit" class="btn btn-primary w-100">Login</button>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="auth.js"></script>

</body>
</html>
