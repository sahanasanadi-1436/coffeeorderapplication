<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bill Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- PDF library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body class="container py-4">

<div id="billContent">

  <h2 class="text-center mb-3">🧾 Coffee Bill</h2>

  <!-- 👤 CUSTOMER DETAILS -->
  <div class="mb-3 p-3 border rounded">
    <h5>Customer Details</h5>
    <p><b>Name:</b> <span id="custName"></span></p>
    <p><b>Email:</b> <span id="custEmail"></span></p>
  </div>

  <!-- 🧾 BILL TABLE -->
  <table class="table table-bordered text-center">
    <thead class="table-dark">
      <tr>
        <th>Item</th>
        <th>Price</th>
        <th>Qty</th>
        <th>Total</th>
      </tr>
    </thead>

    <tbody id="billTable"></tbody>
  </table>

  <h3 class="text-end">
    Grand Total: ₹<span id="grandTotal">0</span>
  </h3>

</div>

<!-- BUTTONS -->
<div class="text-center mt-4">
  <button class="btn btn-primary" onclick="downloadPDF()">⬇ Download Bill</button>
  <button class="btn btn-success" onclick="placeOrder()">Place Order</button>
</div>

<script src="bill.js"></script>
</body>
</html>
